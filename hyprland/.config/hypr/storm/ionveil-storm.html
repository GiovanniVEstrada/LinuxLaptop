<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IonVeil — Signal Storm</title>
<style>
  :root {
    --void:  #05070b;
    --cyan:  #6ee7ff;
    --pink:  #ff6bd6;
    --blue:  #7c9cff;
    --line:  rgba(184, 207, 255, 0.09);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--void); }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(36% 42% at 70% 45%, rgba(110,231,255,0.24) 0%, rgba(110,231,255,0.07) 34%, transparent 64%),
      radial-gradient(58% 66% at 12% 8%, rgba(110,231,255,0.11) 0%, transparent 58%),
      radial-gradient(55% 64% at 94% 98%, rgba(124,156,255,0.13) 0%, rgba(255,107,214,0.06) 40%, transparent 70%),
      radial-gradient(40% 44% at 18% 96%, rgba(255,107,214,0.05) 0%, transparent 64%),
      linear-gradient(158deg, #0a1221 0%, #080e1a 48%, #060912 78%, var(--void) 100%);
  }
  .bg::before {
    content: ""; position: absolute; inset: 0; opacity: 0.6;
    background-image:
      linear-gradient(to right,  var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: 66px 66px; background-position: center;
  }
  .bg::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(140% 130% at 60% 45%, transparent 58%, rgba(5,7,11,0.40) 86%, rgba(5,7,11,0.78) 100%);
  }

  #storm { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
</style>
</head>
<body>
  <div class="bg"></div>
  <canvas id="storm"></canvas>
  <script src="storm.js"></script>
  <script>
    const storm = IonVeilStorm(document.getElementById('storm'));
  </script>
</body>
</html>
