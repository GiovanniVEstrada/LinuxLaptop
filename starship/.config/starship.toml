"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](seg1)\
$os\
$username\
[](fg:seg1 bg:seg2)\
$directory\
[](fg:seg2 bg:seg3)\
$git_branch\
$git_status\
[](fg:seg3 bg:seg4)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:seg4 bg:seg3)\
$time\
[](fg:seg3)\
$line_break$character"""

palette = 'ionveil'

[palettes.ionveil]
# Segment backgrounds (progressively lighter dark shades)
seg1 = "#090e18"
seg2 = "#0d1422"
seg3 = "#121c30"
seg4 = "#17243c"

# Accents
text   = "#f6f8ff"
muted  = "#aab4c8"
cyan   = "#6ee7ff"
blue   = "#7c9cff"
pink   = "#ff6bd6"
green  = "#95f3c3"
red    = "#ff6b6b"
yellow = "#ffd700"

[os]
disabled = false
style = "bg:seg1 fg:cyan"

[os.symbols]
Arch    = "◎"
Linux   = "◎"
Macos   = "◎"
Windows = "◎"

[username]
show_always = true
style_user = "bg:seg1 fg:muted"
style_root = "bg:seg1 fg:red"
format = '[ $user ]($style)'

[directory]
style = "bg:seg2 fg:blue"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "

[git_branch]
symbol = ""
style  = "bg:seg3"
format = '[[ $symbol $branch ](fg:green bg:seg3)]($style)'

[git_status]
style  = "bg:seg3"
format = '[[($all_status$ahead_behind )](fg:green bg:seg3)]($style)'

[nodejs]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[c]
symbol = " "
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[rust]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[golang]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[python]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[php]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[java]
symbol = " "
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[kotlin]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[haskell]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $version) ](fg:cyan bg:seg4)]($style)'

[docker_context]
symbol = ""
style  = "bg:seg4"
format = '[[ $symbol( $context) ](fg:blue bg:seg4)]($style)'

[time]
disabled = false
time_format = "%H:%M"
style = "bg:seg3"
format = '[[  $time ](fg:pink bg:seg3)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[❯](bold fg:cyan)'
error_symbol   = '[❯](bold fg:red)'
vimcmd_symbol  = '[❮](bold fg:green)'
