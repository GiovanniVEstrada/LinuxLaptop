source = $HOME/.config/hypr/ionveil.conf

$font = JetBrainsMono Nerd Font

general {
    disable_loading_bar = true
    hide_cursor = true
}

# ── Background ───────────────────────────────────────────────────
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    brightness = 0.55
    color = $base
}

# ── Time — large, top-right ──────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $cyan
    font_size = 96
    font_family = $font
    position = -48, -48
    halign = right
    valign = top
}

# ── Date — below time ────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = $muted
    font_size = 20
    font_family = $font
    position = -48, -172
    halign = right
    valign = top
}

# ── IonVeil brand — top-left ─────────────────────────────────────
label {
    monitor =
    text = IonVeil
    color = rgba(6ee7ff88)
    font_size = 14
    font_family = $font
    position = 44, -44
    halign = left
    valign = top
}

label {
    monitor =
    text = tech-noir
    color = rgba(aab4c855)
    font_size = 11
    font_family = $font
    position = 44, -66
    halign = left
    valign = top
}

# ── Password input — centered ────────────────────────────────────
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = $cyan
    inner_color = rgba(090e18bb)
    font_color = $text
    fade_on_empty = true
    placeholder_text = <span foreground="##$mutedAlpha"><i>󰌾  password</i></span>
    fail_text = <span foreground="##$redAlpha"><i>$FAIL  ($ATTEMPTS)</i></span>
    check_color = $green
    fail_color = $red
    capslock_color = $yellow
    hide_input = false
    position = 0, 0
    halign = center
    valign = center
}
